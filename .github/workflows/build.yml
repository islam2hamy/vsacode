name: Build VSACODE extension

on:
  workflow_dispatch:                # تشغيل يدوي من صفحة Actions
  push:
    branches: [main]               # أو أي فرع تريد تشغيله تلقائيًا

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ----- Checkout source -----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----- Install system deps (cargo, clang, make) -----
      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup default stable

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make

      # ----- Install Node / Yarn -----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'        # أي نسخة حديثة تدعم المشروع

      - name: Install Yarn (Berry)
        run: npm i -g yarn@latest

      # ----- Install TS compiler -----
      - name: Install TypeScript globally
        run: npm i -g typescript

      # ----- Install project dependencies -----
      - name: Yarn install
        run: yarn install

      # ----- Build all workspaces -----
      - name: Build workspaces
        run: yarn workspaces foreach -A run build

      # ----- Run the VSIX conversion -----
      - name: Convert VSIX
        env:
          VSIX_PATH: ./vsix/lrwx00t.url-encoder-0.0.1.vsix   # المسار داخل المستودع
        run: |
          cd modules/build
          node index.js $VSIX_PATH

      # ----- Upload the result as an artifact -----
      - name: Upload converted extension
        uses: actions/upload-artifact@v4
        with:
          name: url-encoder-extension
          path: modules/build/output/**   # أو المسار الفعلي الناتج
